#============================
# 快捷键换绑区
#============================

# 记录每个 window 最近一次聚焦的 pane 目录
set-hook -g pane-focus-in 'set -w @window_last_path "#{pane_current_path}"'

# 设置垂直分割为 | (左右布局)
bind | if-shell -F '#{@window_last_path}' 'split-window -h -c "#{@window_last_path}"' 'split-window -h -c "#{pane_current_path}"'
unbind %

# 设置水平分割为 - (上下布局)
bind - if-shell -F '#{@window_last_path}' 'split-window -v -c "#{@window_last_path}"' 'split-window -v -c "#{pane_current_path}"'
unbind '"'

# 强制指定细线模式
set -g pane-border-lines single

# 分屏后自动平分窗格
set-hook -g after-split-window 'select-layout -E'

# 关闭窗格后自动平分剩余窗格
set-hook -g after-kill-pane 'select-layout -E'

# 使用<c-/>配合hjkl进行面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 使用<c-/>配合HJKL进行窗格大小调整
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# 使用<prefix> b切换最近使用的窗口（window）
bind b last-window

# 使用<prefix> B切换最近使用的会话（session）
bind B switch-client -l

#===============================
#          其他设置
#===============================

# 使用前缀+g在临时窗口中打开lazygit并切换到当前目录
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# 使用前缀+j在临时弹窗中打开lazygit
bind-key j display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# 使用前缀+t切换状态栏显示/隐藏
bind-key t set-option -g status

# 使用前缀+T 切换 Twenty 开发环境启停
#unbind-key T
#bind-key T run-shell -b "~/.local/bin/twenty-tmux toggle"

# 使用前缀+C 启动 Twenty 并自动在 Chrome 中打开
#unbind-key C
#bind-key C run-shell -b "~/.local/bin/twenty-tmux chrome"

# 使用前缀+M 打开 tmux 的自定义配置浏览界面
# 这个界面会列出 Server/Session/Window & Pane Options 和各个 Key Table，
# 和 tmux 3.6a 内置的 customize-mode 一致。
unbind-key M
bind-key M customize-mode -Z

# search sessions using fzf (使用 E)
bind E display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-session |\
    xargs tmux switch-client -t; tmux refresh-client -S"

# search windows in current session (使用 <prefix> F)
bind F display-popup -E "\
    tmux list-windows -F '#{window_index} #{window_name}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-window |\
    cut -d ' ' -f 1 |\
    xargs tmux select-window -t; tmux refresh-client -S"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'off'

# 状态栏样式先定义，让 continuum 在此基础上注入自动保存钩子。
# 这样可以保留现有外观，同时不覆盖自动保存逻辑。
set -g status-style 'bg=colour232,fg=colour250'
set -g status-interval 2
set -g window-status-style 'fg=colour250,bg=colour236'
set -g window-status-format ' #I #W#F '
set -g window-status-current-style 'fg=colour255,bg=colour245,bold'
set -g window-status-current-format ' #I #W#F '
set -g window-status-activity-style 'fg=colour250,bg=colour236'
set -g window-status-separator ''
set -g status-left-length 30
set -g status-left '#[fg=colour250,bg=colour236] #S #[fg=colour236,bg=colour232] '
set -g status-right-length 80
set -g status-right '#[fg=colour250,bg=colour238] #(~/.config/tmux/shorten_path.sh "#{pane_current_path}") #[fg=colour14,bg=colour238] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "no git") #[fg=colour255,bg=colour238,bold] %H:%M '

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# 能够感知Vim分割窗口的Tmux面板切换方式
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
 | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 
 # vim语法误报了
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
# 这里依赖外层终端把 C-S-j 作为独立的扩展键序列发给 tmux。
# 如果 iTerm2 的“Report modifiers using CSI u”没开，C-S-j 会退化成普通 C-j，
# 然后就会被这个 root binding 抢走，导致 Codex 里不能换行。
bind-key -n C-j if-shell "[ #{pane_current_command} = codex ] || $is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# 使用Ctrl+/作为前缀键
unbind-key C-b
set -g prefix 'C-/'
bind-key 'C-/' send-prefix

setw -g xterm-keys on
set-window-option -g xterm-keys on
set -s escape-time 0
set -sg repeat-time 300
set -s focus-events on
set-hook -g client-attached 'move-window -r -t "#{client_session}"; refresh-client'
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -sg exit-empty on
set -g detach-on-destroy off

set -q -g status-utf8 on
setw -q -g utf8 on

# 关于提醒的一些设置
set -g visual-activity off
setw -g monitor-activity off
setw -g monitor-bell off
set -g bell-action any
set -g visual-bell off

set -g history-limit 10000

set-hook -g pane-focus-in "run -b 'bash ~/.config/tmux/fzf_panes.tmux update_mru_pane_ids'"

# ========== 滚动速度配置 ==========
# 降低滚动速度（每次滚动 2 行，默认是 5 行）
# 数字越小滚动越慢，可以改成 1 让滚动更慢
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

setw -g monitor-activity # Highlight windows with activity in the status bar

# don't rename windows automatically
set-option -g allow-rename off
# renumber remaining windows after one is closed
set -g renumber-windows on
